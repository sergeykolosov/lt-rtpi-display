[display]
# Comma-separated stop IDs to cycle through.
# 0409 is MO muziejus, southbound (e.g. towards Stotis, Oro uostas);
# 0410 is MO muziejus, northbound (e.g. towards Santariškės).
stop_ids = 0410, 0409

# How often to refresh data from the API (seconds)
refresh_interval = 30

# Timezone for interpreting departure times (IANA tz name)
timezone = Europe/Vilnius

[api]
# HTTP request timeout (seconds)
timeout = 10

[gpio]
# Waveshare 3.2" RPi LCD (B) buttons — physical pins 12/16/18 → BCM GPIO 18/23/24
key1_pin = 18
key2_pin = 23
key3_pin = 24
# Button actions (available: next_stop, next_page)
key1_action = next_stop
key2_action = next_page
key3_action =
